name: Freqtrade CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install TA-Lib C library
      run: |
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib/
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..

    - name: Install dependencies
      run: make install

    - name: Fetch data
      run: make fetch-data

    - name: Run backtest
      run: make backtest

    - name: Run Wolfe Waves backtest
      run: make backtest-wolfe

    - name: Generate plots
      run: make plot

    - name: Generate probability heatmap
      run: make heatmap

    - name: Upload plots
      uses: actions/upload-artifact@v4
      with:
        name: backtest-plots
        path: user_data/plot/*.html
